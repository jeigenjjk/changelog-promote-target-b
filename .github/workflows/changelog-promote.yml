name: Changelog Promote
on:
  push:
    branches: [main]
    paths: ['CHANGELOG.md']
jobs:
  promote:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    uses: jeigenjjk/changelog-promote-pipeline/.github/workflows/changelog-promote.yml@main
    with:
      trigger_sha: ${{ github.sha }}
    permissions:
      contents: write
      pull-requests: read
